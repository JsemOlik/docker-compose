http:
  routers:
    immich-http:
      rule: Host(`immich.jsemolik.dev`)
      entryPoints:
        - web
      middlewares:
        - redirect-to-https
      service: immich

    immich-https:
      rule: Host(`immich.jsemolik.dev`)
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: immich

  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https

  services:
    immich:
      loadBalancer:
        servers:
          - url: "http://10.1.0.30:30041"
