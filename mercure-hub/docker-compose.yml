services:
  mercure:
    image: dunglas/mercure
    container_name: mercure-hub
    restart: unless-stopped
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_PUBLISHER_JWT_KEY:-mercure}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_SUBSCRIBER_JWT_KEY:-mercure}
      MERCURE_EXTRA_DIRECTIVES: |
        anonymous
        cors_origins https://${SSE_HOST:-sse.example.com} http://localhost:1420 http://localhost:3000
    volumes:
      - ./data:/data
      - ./config:/config
    expose:
      - "80"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.mercure.rule=Host(`${SSE_HOST:-sse.example.com}`)"
      - "traefik.http.routers.mercure.entrypoints=websecure"
      - "traefik.http.routers.mercure.tls=true"
      - "traefik.http.routers.mercure.tls.certresolver=letsencrypt"
      - "traefik.http.services.mercure.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
    name: proxy
